<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Audio & Video Player</title>

  <meta
    name="description"
    content="A simple HTML5 Audio and Video Player demonstrating media elements, playback controls, looping, and poster images."
  >
</head>

<body>
  <header>
    <h1>My Favorite Songs</h1>
    <p>
      A simple HTML5 media showcase featuring video and audio playback.
    </p>
  </header>

  <main>
    <section>
      <h2>Featured Music Video</h2>

      <video
        width="640"
        controls
        loop
        muted
        poster="https://i.postimg.cc/90RSr89n/684144841-983045511372183-8402742123021695412-n.jpg"
      >
        <source
          src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
          type="video/mp4"
        >
        Your browser does not support the video file.
      </video>
    </section>

    <section>
      <h2>Featured Audio Track</h2>

      <audio
        src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3"
        controls
        loop
      >
        Your browser does not support the audio element.
      </audio>
    </section>
  </main>
</body>
</html>
